name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건만 유지 (진행 중 실행은 취소하지 않고 큐잉)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build static site
        run: node scripts/build.mjs
        env:
          # 커스텀 루트 도메인(anmaking.com)으로 서빙 — 하위경로(BASE_PATH) 없음
          SITE_URL: https://anmaking.com
      - name: Configure Pages
        # ⚠️ 최초 1회 저장소 Settings → Pages → Source: "GitHub Actions" 로 활성화 필요
        #    (워크플로 토큰은 Pages 사이트를 '생성'할 권한이 없음 — 수동 활성화 후 자동 배포)
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
